name: CI — Build STM32MP257FDK Targets

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Cortex-M33 Firmware ────────────────────────────────────────────────────
  build-m33:
    name: Build Cortex-M33 Firmware
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi ninja-build cmake

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Configure (Debug)
        run: |
          cmake -B build/m33 -S cortex-m33 \
            -DCMAKE_TOOLCHAIN_FILE=cortex-m33/cmake/toolchain-m33.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build/m33 --parallel

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: m33-firmware-debug
          path: |
            build/m33/*.elf
            build/m33/*.bin
            build/m33/*.map

  # ── Cortex-A35 Linux App ───────────────────────────────────────────────────
  build-a35:
    name: Build Cortex-A35 Linux App
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                                  ninja-build cmake

      - name: Verify toolchain
        run: aarch64-linux-gnu-g++ --version

      - name: Configure (Release)
        run: |
          cmake -B build/a35 -S cortex-a35 \
            -DCMAKE_TOOLCHAIN_FILE=cortex-a35/cmake/toolchain-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build/a35 --parallel

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: a35-app-release
          path: build/a35/stm32mp257fdk_app

  # ── Code Style Check ──────────────────────────────────────────────────────
  clang-format:
    name: Check Code Style
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find cortex-a35 cortex-m33 shared \
            \( -name "*.c" -o -name "*.cpp" -o -name "*.h" \) \
            | xargs clang-format --dry-run --Werror --style=file
